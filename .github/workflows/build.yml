name: build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cli_artifact:  binary-analyzer.exe
            gui_artifact:  binary-analyzer-gui.exe
            artifact_name: binaries-windows
          - os: ubuntu-latest
            cli_artifact:  binary-analyzer
            gui_artifact:  binary-analyzer-gui
            artifact_name: binaries-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build CLI + GUI binaries
        run: python build.py --both

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.cli_artifact }}
            dist/${{ matrix.gui_artifact }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: List downloaded artifacts
        run: find dist-all -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-all/binaries-windows/binary-analyzer.exe
            dist-all/binaries-windows/binary-analyzer-gui.exe
            dist-all/binaries-linux/binary-analyzer
            dist-all/binaries-linux/binary-analyzer-gui
          generate_release_notes: true
