name: build

on:
  workflow_dispatch:          # run manually from Actions tab
  push:
    tags:
      - "v*"                  # auto-run on version tags like v0.2.0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: binary-analyzer.exe
            artifact_name: binary-analyzer-windows
          - os: ubuntu-latest
            artifact: binary-analyzer
            artifact_name: binary-analyzer-linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build standalone binary
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  # Create a GitHub Release with both binaries when a version tag is pushed.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: List downloaded artifacts
        run: find dist-all -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-all/binary-analyzer-windows/binary-analyzer.exe
            dist-all/binary-analyzer-linux/binary-analyzer
          generate_release_notes: true
